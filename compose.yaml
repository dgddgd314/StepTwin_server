services:
  mysql:
    image: mysql:8.4
    container_name: steptwin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: steptwin
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
