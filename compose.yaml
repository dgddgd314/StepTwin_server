services:
  postgres:
    image: pgrouting/pgrouting:latest
    container_name: steptwin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: steptwin
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
